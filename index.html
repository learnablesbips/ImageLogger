<!DOCTYPE html>
<html>
<head>
    <title>AI System Gateway</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        img { max-width: 80%; border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; }
    </style>
</head>
<body>
    <h1>🛰️ ANALYZING IMAGE...</h1>
    <img src="test.jpg" id="display-img">

    <script>
        const params = new URLSearchParams(window.location.search);
        const user = params.get('user');

        // Ping the bot back
        fetch('YOUR_DISCORD_WEBHOOK_URL', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: `!trigger_ai ${user}` })
        }).then(() => {
            setTimeout(() => { window.close(); }, 2500);
        });
    </script>
</body>
</html>
